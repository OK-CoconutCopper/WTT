      <div class="dash-mode-tabs">
        <button class="dash-mode-tab active" onclick="setDashMode('all',this)">All Time</button>
        <button class="dash-mode-tab" onclick="setDashMode('yearly',this)">Yearly</button>
        <button class="dash-mode-tab" onclick="setDashMode('monthly',this)">Monthly</button>
      </div>
      <div class="dash-nav" id="dashNav" style="display:none">
        <!-- Month selector — only in monthly mode -->
        <select class="dash-year-input" id="dashMonthSelect" style="display:none;width:90px"
                onchange="dashMonth=parseInt(this.value);renderDashboard()">
          <option value="0">January</option><option value="1">February</option>
          <option value="2">March</option><option value="3">April</option>
          <option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option>
          <option value="8">September</option><option value="9">October</option>
          <option value="10">November</option><option value="11">December</option>
        </select>
        <!-- Year input -->
        <span class="dash-year-label">Year</span>
        <input class="dash-year-input" type="number" id="dashYearInput" min="2000" max="2099"
               value="" onchange="setDashYear(this.value)" />
      </div>
    </div>

    <!-- Scoped summary pills -->
    <div class="dash-summary-row" id="dashSummaryRow"></div>

    <div class="dash-grid">

      <!-- Completion Ring -->
      <div class="dash-card">
        <div class="dash-title">Completion Rate</div>
        <div class="ring-wrap">
          <svg class="ring-svg" width="88" height="88" viewBox="0 0 88 88">
            <circle cx="44" cy="44" r="35" fill="none" stroke="var(--border)" stroke-width="7"/>
            <circle id="ringCircle" cx="44" cy="44" r="35" fill="none" stroke="var(--accent)"
              stroke-width="7" stroke-linecap="round"
              stroke-dasharray="219.9" stroke-dashoffset="219.9"
              transform="rotate(-90 44 44)"
              style="transition: stroke-dashoffset 0.7s ease"/>
          </svg>
          <div>
            <div class="ring-pct" id="ringPct">0%</div>
            <div class="ring-sub" id="ringDesc">0 of 0 tasks done</div>
          </div>
        </div>
      </div>

      <!-- Priority Breakdown -->
      <div class="dash-card">
        <div class="dash-title">By Priority</div>
        <div class="bar-chart" id="dashPriority"></div>
      </div>

      <!-- By Period -->
      <div class="dash-card">
        <div class="dash-title">By Period</div>
        <div class="bar-chart" id="dashPeriod"></div>
      </div>

      <!-- By Criteria -->
      <div class="dash-card">
        <div class="dash-title">By Criteria</div>
        <div class="bar-chart" id="dashCriteria"></div>
      </div>

      <!-- Monthly Table / Activity Chart (full width, swaps based on mode) -->
      <div class="dash-card full" id="dashActivityCard">
        <div class="dash-title" id="dashActivityTitle">Activity</div>
        <!-- Day chart (shown in monthly mode only) -->
        <div id="dashDayChartWrap" style="display:none">
          <div class="activity-chart" id="dashDayActivity"></div>
          <div class="dash-activity-legend" style="margin-bottom:16px">
            <div style="display:flex;align-items:center;gap:5px">
              <div class="dash-legend-dot" style="background:#4caf80;border-radius:2px"></div>
              <span class="dash-legend-text">Completed</span>
            </div>
            <div style="display:flex;align-items:center;gap:5px">
              <div class="dash-legend-dot" style="background:var(--accent);border-radius:2px"></div>
              <span class="dash-legend-text">Active</span>
            </div>
          </div>
          <div style="border-top:1px solid var(--border);margin-bottom:12px;padding-top:12px">
            <div class="dash-title">Full Year — <span id="dashTableYear"></span></div>
          </div>
        </div>
        <!-- Monthly table (shown in monthly mode) -->
        <div id="dashMonthlyTable" style="display:none;overflow-x:auto"></div>
        <!-- Bar activity chart (shown in yearly / all-time mode) -->
        <div id="dashActivityChartWrap">
          <div class="activity-chart" id="dashActivity"></div>
          <div class="dash-activity-legend">
            <div style="display:flex;align-items:center;gap:5px">
              <div class="dash-legend-dot" style="background:#4caf80;border-radius:2px"></div>
              <span class="dash-legend-text">Completed</span>
            </div>
            <div style="display:flex;align-items:center;gap:5px">
              <div class="dash-legend-dot" style="background:var(--accent);border-radius:2px"></div>
              <span class="dash-legend-text">Active</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Sub-criteria Breakdown (full width) -->
      <div class="dash-card full">
        <div class="dash-title">Sub-criteria Breakdown</div>
        <div class="bar-chart" id="dashSubcriteria"></div>
      </div>

    </div>
  </div>

  <!-- ════════════════════════════════════════
       CRITERIA VIEW
  ════════════════════════════════════════ -->
  <div id="view-criteria" style="display:none">
    <div class="criteria-manager">

      <!-- Add Criteria -->
      <div class="criteria-add-form">
        <div class="section-title">Add New Criteria</div>
        <div class="form-row">
          <input class="emoji-input" type="text" id="newCriteriaEmoji" placeholder="🏷️" maxlength="2" />
          <input type="text" id="newCriteriaName" placeholder="Criteria name (e.g. Work, Health…)" maxlength="30" />
          <button class="btn-add" onclick="addCriteria()">+ Add</button>
        </div>
      </div>

      <div class="section-title" style="margin-bottom:0">Your Criteria</div>
      <div class="criteria-list" id="criteriaList"></div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ═══════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════
const TASKS_KEY    = 'taskday_v3_tasks';
const CRITERIA_KEY = 'taskday_v3_criteria';

let tasks    = [];
let criteria = [];
let currentFilter = 'all';
let currentView   = 'tasks';
let openPopupId   = null;
let dashMode      = 'all';   // 'all' | 'yearly' | 'monthly'
let dashYear      = new Date().getFullYear();
let dashMonth     = new Date().getMonth(); // 0-indexed

const DEFAULT_CRITERIA = [
  { id: 2001, name: 'Work',     emoji: '💼', subcriteria: [{id:20011,name:'Meetings'},{id:20012,name:'Reports'},{id:20013,name:'Planning'}] },
  { id: 2002, name: 'Personal', emoji: '🏠', subcriteria: [{id:20021,name:'Health'},{id:20022,name:'Family'},{id:20023,name:'Finance'}] },
  { id: 2003, name: 'Learning', emoji: '📚', subcriteria: [{id:20031,name:'Reading'},{id:20032,name:'Courses'}] },
  { id: 2004, name: 'Other',    emoji: '⚡', subcriteria: [] }
];

function load() {
  const rt = localStorage.getItem(TASKS_KEY);
  const rc = localStorage.getItem(CRITERIA_KEY);
  tasks    = rt ? JSON.parse(rt) : [];
  criteria = rc ? JSON.parse(rc) : JSON.parse(JSON.stringify(DEFAULT_CRITERIA));
}

function save() {
  localStorage.setItem(TASKS_KEY,    JSON.stringify(tasks));
  localStorage.setItem(CRITERIA_KEY, JSON.stringify(criteria));
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-tasks').style.display      = view === 'tasks'     ? '' : 'none';
  document.getElementById('view-completed').style.display  = view === 'completed' ? '' : 'none';
  document.getElementById('view-dashboard').style.display  = view === 'dashboard' ? '' : 'none';
  document.getElementById('view-criteria').style.display   = view === 'criteria'  ? '' : 'none';
  if (view === 'dashboard') renderDashboard();
  if (view === 'criteria')  renderCriteria();
  if (view === 'completed') renderCompleted();
}

// ═══════════════════════════════════════════════════
// FORM HELPERS
// ═══════════════════════════════════════════════════
function populateCriteriaSelect() {
  const sel = document.getElementById('criteriaSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— Criteria —</option>' +
    criteria.map(c => `<option value="${c.id}">${c.emoji} ${esc(c.name)}</option>`).join('');
  if (prev) sel.value = prev;
  updateSubcriteria();
}

function updateSubcriteria() {
  const cid = parseInt(document.getElementById('criteriaSelect').value);
  const sel  = document.getElementById('subcriteriaSelect');
  const c    = criteria.find(x => x.id === cid);
  if (c && c.subcriteria.length > 0) {
    sel.innerHTML = '<option value="">— Sub-criteria —</option>' +
      c.subcriteria.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
    sel.style.display = '';
  } else {
    sel.innerHTML = '<option value="">— Sub-criteria —</option>';
    sel.style.display = '';
  }
}

function toggleOptionalDates() {
  const btn   = document.getElementById('optDatesBtn');
  const panel = document.getElementById('optDatesPanel');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '＋ Set task date / completion date' : '－ Set task date / completion date';
}

function toggleCustomDates() {
  const val = document.getElementById('periodSelect').value;
  document.getElementById('customDates').classList.toggle('visible', val === 'custom');
}

// ═══════════════════════════════════════════════════
// TASK CRUD
// ═══════════════════════════════════════════════════
function addTask() {
  const inp  = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }

  const period  = document.getElementById('periodSelect').value;
  const cid     = parseInt(document.getElementById('criteriaSelect').value)    || null;
  const sid     = parseInt(document.getElementById('subcriteriaSelect').value) || null;
  const taskDateVal      = document.getElementById('taskDateInput').value      || null;
  const completedDateVal = document.getElementById('completedDateInput').value || null;

  tasks.unshift({
    id:            Date.now(),
    text,
    criteriaId:    cid,
    subcriteriaId: sid,
    priority:      document.getElementById('prioritySelect').value,
    period,
    periodStart:   period === 'custom' ? document.getElementById('periodStart').value : null,
    periodEnd:     period === 'custom' ? document.getElementById('periodEnd').value   : null,
    done:          !!completedDateVal,
    taskDate:      taskDateVal,
    completedDate: completedDateVal,
    created:       new Date().toISOString(),
    comments:      []
  });

  save();
  inp.value = '';
  // Reset optional date fields and collapse panel
  document.getElementById('taskDateInput').value      = '';
  document.getElementById('completedDateInput').value = '';
  const panel = document.getElementById('optDatesPanel');
  const btn   = document.getElementById('optDatesBtn');
  if (panel) panel.classList.remove('open');
  if (btn)   { btn.classList.remove('open'); btn.textContent = '＋ Set task date / completion date'; }
  inp.focus();
  renderTasks();
  updateGlobalStats();
  updateDoneBadge();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    if (t.done && !t.completedDate) t.completedDate = todayStr();
    if (!t.done) t.completedDate = null;
    save();
    renderTasks();
    updateGlobalStats();
    updateDoneBadge();
    if (currentView === 'completed') renderCompleted();
  }
}

function updateDoneBadge() {
  const cnt = tasks.filter(t => t.done).length;
  const badge = document.getElementById('doneBadge');
  if (badge) badge.textContent = cnt;
}

function deleteTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const preview = t.text.length > 50 ? t.text.slice(0, 50) + '…' : t.text;
  const hasComments = t.comments?.length > 0;
  const msg = hasComments
    ? `Delete "${preview}"?\n\nThis task has ${t.comments.length} comment${t.comments.length !== 1 ? 's' : ''} that will also be deleted.`
    : `Delete "${preview}"?`;
  if (!confirm(msg)) return;
  const el = document.querySelector(`[data-taskid="${id}"]`);
  if (el) el.classList.add('removing');
  setTimeout(() => {
    tasks = tasks.filter(t => t.id !== id);
    save(); renderTasks(); renderCompleted(); updateGlobalStats(); updateDoneBadge();
  }, 260);
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save(); renderTasks(); updateGlobalStats();
}

function setTaskPeriod(id, period, start, end) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.period      = period;
  t.periodStart = start || null;
  t.periodEnd   = end   || null;
  save(); renderTasks();
}

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTasks();
}

function getFiltered() {
  const searchEl = document.getElementById('taskSearch');
  const query = searchEl ? searchEl.value.trim().toLowerCase() : '';
  const clearBtn = document.getElementById('taskSearchClear');
  if (clearBtn) clearBtn.classList.toggle('visible', query.length > 0);

  return tasks.filter(t => {
    if (t.done) return false;

    // Search filter
    if (query) {
      const crit = criteria.find(c => c.id === t.criteriaId);
      const sub  = crit ? crit.subcriteria.find(s => s.id === t.subcriteriaId) : null;
      const match = t.text.toLowerCase().includes(query)
        || (crit && crit.name.toLowerCase().includes(query))
        || (sub  && sub.name.toLowerCase().includes(query));
      if (!match) return false;
    }

    if (currentFilter === 'all')    return true;
    if (currentFilter === 'high')   return t.priority === 'high';
    if (currentFilter === 'medium') return t.priority === 'medium';
    if (currentFilter === 'low')    return t.priority === 'low';
    if (currentFilter === 'na-pri') return t.priority === 'na';
    if (currentFilter === 'custom') return t.period === 'custom';
    const numFilter = parseInt(currentFilter);
    if (!isNaN(numFilter)) return t.criteriaId === numFilter;
    return true;
  });
}

function clearTaskSearch() {
  const inp = document.getElementById('taskSearch');
  if (inp) inp.value = '';
  const btn = document.getElementById('taskSearchClear');
  if (btn) btn.classList.remove('visible');
  renderTasks();
}

// ═══════════════════════════════════════════════════
// GLOBAL STATS
// ═══════════════════════════════════════════════════
function updateGlobalStats() {
  const total   = tasks.length;
  const done    = tasks.filter(t => t.done).length;
  const pending = total - done;
  const high    = tasks.filter(t => t.priority === 'high' && !t.done).length;
  const pct     = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('qTotal').textContent   = total;
  document.getElementById('qDone').textContent    = done;
  document.getElementById('qPending').textContent = pending;
  document.getElementById('qHigh').textContent    = high;
  document.getElementById('progressPct').textContent    = pct + '%';
  document.getElementById('progressFill').style.width   = pct + '%';
  updateDoneBadge();
}

// ═══════════════════════════════════════════════════
// RENDER TASKS (grouped accordion)
// ═══════════════════════════════════════════════════
function toggleTaskGroup(groupId) {
  openTaskGroups.has(groupId) ? openTaskGroups.delete(groupId) : openTaskGroups.add(groupId);
  const el = document.querySelector(`.task-group[data-tgid="${groupId}"]`);
  if (el) el.classList.toggle('open', openTaskGroups.has(groupId));
}

function toggleTaskSubgroup(subId) {
  openTaskSubgroups.has(subId) ? openTaskSubgroups.delete(subId) : openTaskSubgroups.add(subId);
  const el = document.querySelector(`.task-subgroup[data-tsgid="${subId}"]`);
  if (el) el.classList.toggle('open', openTaskSubgroups.has(subId));
}

function renderTasks() {
  renderFilterBar();
  const list     = document.getElementById('taskList');
  const filtered = getFiltered();

  if (filtered.length === 0) {
    const query = document.getElementById('taskSearch')?.value.trim();
    list.innerHTML = query
      ? `<div class="empty"><div class="empty-icon">🔍</div>No tasks match "<strong>${esc(query)}</strong>".</div>`
      : `<div class="empty"><div class="empty-icon">✦</div>No tasks here.<br>Add something above to get started.</div>`;
    return;
  }

  const query = document.getElementById('taskSearch')?.value.trim().toLowerCase() || '';

  // Build groups: criteria → sub-criteria → tasks
  const groups = [];

  criteria.forEach(c => {
    const critTasks = filtered.filter(t => t.criteriaId === c.id);
    if (critTasks.length === 0) return;

    const subGroups = [];
    c.subcriteria.forEach((s, si) => {
      const subTasks = critTasks.filter(t => t.subcriteriaId === s.id);
      if (subTasks.length > 0) subGroups.push({ id: `${c.id}-${s.id}`, label: s.name, tasks: subTasks, cid: c.id, sid: s.id });
    });
    const noSub = critTasks.filter(t => !t.subcriteriaId);
    if (noSub.length > 0) subGroups.push({ id: `${c.id}-none`, label: null, tasks: noSub, cid: c.id, sid: null });

    groups.push({ id: String(c.id), emoji: c.emoji, name: c.name, count: critTasks.length, subGroups });
  });

  const unassigned = filtered.filter(t => !t.criteriaId);
  if (unassigned.length > 0) {
    groups.push({ id: 'unassigned', emoji: '📌', name: 'Unassigned', count: unassigned.length,
      subGroups: [{ id: 'unassigned-none', label: null, tasks: unassigned }] });
  }

  list.innerHTML = groups.map(g => {
    const isOpen = query ? true : openTaskGroups.has(g.id);
    const subLabels = g.subGroups.filter(sg => sg.label).map(sg => esc(sg.label)).join(' · ');
    const preview = subLabels
      ? `<span style="font-family:JetBrains Mono,monospace;font-size:0.58rem;color:var(--muted);margin-left:4px">${subLabels}</span>`
      : '';

    const subGroupsHtml = g.subGroups.map(sg => {
      const sgOpen = query ? true : openTaskSubgroups.has(sg.id);

      if (!sg.label) {
        return `
          <div class="task-subgroup open" data-tsgid="${sg.id}">
            <div class="task-subgroup-body">
              <div class="task-subgroup-tasks">${sg.tasks.map(t => activeTaskCard(t)).join('')}</div>
            </div>
          </div>`;
      }

      return `
        <div class="task-subgroup${sgOpen ? ' open' : ''}" data-tsgid="${sg.id}">
          <div class="task-subgroup-header" onclick="toggleTaskSubgroup('${sg.id}')">
            ▸ ${esc(sg.label)}
            <span class="task-subgroup-count">${sg.tasks.length} task${sg.tasks.length !== 1 ? 's' : ''}</span>
            <span class="task-subgroup-chevron">▶</span>
            <span class="sg-reorder" onclick="event.stopPropagation()">
              <span onclick="moveSubGroup(${sg.cid},${sg.sid},-1)" title="Move up">▲</span>
              <span onclick="moveSubGroup(${sg.cid},${sg.sid},1)"  title="Move down">▼</span>
            </span>
          </div>
          <div class="task-subgroup-body">
            <div class="task-subgroup-tasks">${sg.tasks.map(t => activeTaskCard(t)).join('')}</div>
          </div>
        </div>`;
    }).join('');

    return `
    <div class="task-group${isOpen ? ' open' : ''}" data-tgid="${g.id}">
      <div class="task-group-header" onclick="toggleTaskGroup('${g.id}')">
        <span class="task-group-icon">${esc(g.emoji)}</span>
        <span class="task-group-name">${esc(g.name)}</span>
        ${preview}
        <span class="task-group-count">${g.count} task${g.count !== 1 ? 's' : ''}</span>
        <span class="task-group-chevron">▶</span>
      </div>
      <div class="task-group-body">${subGroupsHtml}</div>
    </div>`;
  }).join('');
}

function activeTaskCard(t) {
  const pl = periodLabel(t);
  const comments = t.comments || [];
  const cCount = comments.length;
  const commentsOpen = openComments.has(t.id);
  const query = document.getElementById('taskSearch')?.value.trim().toLowerCase() || '';

  return `
  <div class="task-card">
    <div class="task-item${commentsOpen ? ' comments-open' : ''}" data-taskid="${t.id}" data-priority="${t.priority}">
      <div class="task-check" onclick="toggleTask(${t.id})">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
          <path d="M1 4l3 3.5L10 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-content">
        <div class="task-text" onclick="editTaskName(event,${t.id})" id="tname-${t.id}" title="Click to rename">${highlightMatch(t.text, query)}</div>
        <div class="task-meta" style="position:relative">
          <span class="btn-reassign" onclick="toggleReassign(event,${t.id})" title="Change criteria / sub-criteria">⇄</span>
          <div class="reassign-popup" id="rp-${t.id}" onclick="event.stopPropagation()">
            <div><label>Criteria</label>
              <select id="rp-crit-${t.id}" onchange="updateReassignSub(${t.id})">
                <option value="">— None —</option>
                ${criteria.map(c=>`<option value="${c.id}"${t.criteriaId===c.id?' selected':''}>${esc(c.emoji)} ${esc(c.name)}</option>`).join('')}
              </select>
            </div>
            <div><label>Sub-criteria</label>
              <select id="rp-sub-${t.id}">
                <option value="">— None —</option>
                ${(criteria.find(c=>c.id===t.criteriaId)?.subcriteria||[]).map(s=>`<option value="${s.id}"${t.subcriteriaId===s.id?' selected':''}>${esc(s.name)}</option>`).join('')}
              </select>
            </div>
            <button class="btn-reassign-save" onclick="applyReassign(event,${t.id})">Apply</button>
          </div>
          <span class="tag tag-${t.priority} clickable" onclick="togglePriorityPopup(event,${t.id})">${t.priority === 'na' ? 'N/A' : t.priority}</span>
          <div class="priority-popup" id="prip-${t.id}">
            <button class="priority-opt-btn opt-high"   onclick="setPriority(event,${t.id},'high')">🔴 High</button>
            <button class="priority-opt-btn opt-medium" onclick="setPriority(event,${t.id},'medium')">🟡 Medium</button>
            <button class="priority-opt-btn opt-low"    onclick="setPriority(event,${t.id},'low')">🔵 Low</button>
            <button class="priority-opt-btn opt-na"     onclick="setPriority(event,${t.id},'na')">∅ N/A</button>
          </div>
          <span class="period-badge ${t.period}" onclick="togglePopup(event,${t.id})">📅 ${esc(pl)} ▾</span>
          <div class="period-popup" id="pp-${t.id}" data-taskid="${t.id}">
            <button class="period-opt" onclick="pickPeriod(event,${t.id},'na')">📅 N/A</button>
            <button class="period-opt" onclick="pickPeriod(event,${t.id},'custom-show')">📅 Custom Range…</button>
            <div class="pp-date-block" id="pp-dates-${t.id}" style="display:none">
              <input type="date" id="pp-s-${t.id}" value="${t.periodStart||todayStr()}" />
              <span style="font-family:JetBrains Mono,monospace;font-size:0.6rem;color:var(--muted);text-align:center">→ end date</span>
              <input type="date" id="pp-e-${t.id}" value="${t.periodEnd||todayStr()}" />
              <button class="btn-sm" onclick="applyCustom(event,${t.id})">Apply</button>
            </div>
          </div>
          <button class="btn-comment${cCount > 0 ? ' has-comments' : ''}"
                  onclick="toggleComments(event,${t.id})">
            💬 ${cCount > 0 ? cCount : 'Comment'}
          </button>
          <button class="btn-toggle-dates" onclick="toggleTaskDates(event,${t.id})" id="tdb-${t.id}" style="${(t.taskDate||t.completedDate)?'color:var(--accent)':''}">📅 dates</button>
          <span class="task-time">${fmtTime(t.created)}</span>
        </div>
        <div class="task-date-row" id="tdr-${t.id}" style="display:none">
          <div class="task-date-field">
            <span class="task-date-label">📌 Task</span>
            <span class="task-date-val${!t.taskDate?' empty':''}"
                  onclick="editTaskDate(event,${t.id},'taskDate')"
                  id="td-task-${t.id}">${t.taskDate || 'Set date'}</span>
          </div>
          <div class="task-date-field">
            <span class="task-date-label">✅ Done</span>
            <span class="task-date-val completed-date${!t.completedDate?' empty':''}"
                  onclick="editTaskDate(event,${t.id},'completedDate')"
                  id="td-done-${t.id}">${t.completedDate || 'Not set'}</span>
          </div>
        </div>
      </div>
      <button class="btn-delete" onclick="deleteTask(${t.id})" title="Delete">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="btn-reorder" title="Move up/down">
        <span onclick="moveTask(${t.id},-1)">▲</span>
        <span onclick="moveTask(${t.id},1)">▼</span>
      </div>
    </div>
    <div class="task-comments${commentsOpen ? ' open' : ''}" id="tc-${t.id}">
      ${commentsInnerHTML(t)}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// COMMENTS
// ═══════════════════════════════════════════════════
// ── Auto-resize textarea ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ═══════════════════════════════════════════════════
// THREADED COMMENTS
// ═══════════════════════════════════════════════════

function commentsInnerHTML(t) {
  const comments = t.comments || [];

  // Build tree: top-level first, then children
  const roots    = comments.filter(c => !c.parentId);
  const children = id => comments.filter(c => c.parentId === id);

  function renderNode(c, depth) {
    const isRoot   = !c.parentId;
    const replyIcon = isRoot ? '↓' : '↩';
    const replyTitle = isRoot ? 'Reply to this comment' : 'Reply to this reply';

    // Indent bars
    const bars = Array.from({ length: depth }, () =>
      `<div class="comment-indent-bar"></div>`).join('');
    const indentHtml = depth > 0 ? `<div class="comment-indent">${bars}</div>` : '';

    const childNodes = children(c.id).map(ch => renderNode(ch, depth + 1)).join('');

    return `
      <div class="comment-node">
        <div class="comment-item" id="cmt-${c.id}">
          ${indentHtml}
          <div class="comment-avatar">💬</div>
          <div class="comment-body">
            <div class="comment-text" id="ctxt-${c.id}">${esc(c.text)}</div>
            <div class="comment-footer">
              <span class="comment-time">${fmtDateTime(c.created)}</span>
              <button class="btn-reply-comment" onclick="showReplyBox(${t.id},${c.id},${depth})" title="${replyTitle}">${replyIcon}</button>
              <button class="btn-edit-comment"  onclick="startEditComment(${t.id},${c.id})" title="Edit">✎</button>
              <button class="btn-del-comment"   onclick="deleteComment(${t.id},${c.id})"    title="Delete">✕</button>
            </div>
          </div>
        </div>
        <div id="reply-box-${c.id}"></div>
        ${childNodes}
      </div>`;
  }

  const threadHtml = roots.length === 0
    ? `<div class="no-comments">No comments yet…</div>`
    : `<div class="comment-thread">${roots.map(c => renderNode(c, 0)).join('')}</div>`;

  return `${threadHtml}
    <div class="comment-add">
      <div style="flex:1;display:flex;flex-direction:column">
        <textarea id="ci-${t.id}" placeholder="Add a comment… (Enter to post, Shift+Enter for new line)"
                  rows="1" maxlength="1000"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addComment(${t.id})}"
                  oninput="autoResize(this)"></textarea>
        <div class="comment-hint">Shift+Enter for new line</div>
      </div>
      <button class="btn-post" onclick="addComment(${t.id})">Post</button>
    </div>`;
}

function showReplyBox(taskId, parentCommentId, depth) {
  // Close any open reply boxes for this task first
  document.querySelectorAll(`[id^="reply-box-"]`).forEach(el => el.innerHTML = '');

  const box = document.getElementById(`reply-box-${parentCommentId}`);
  if (!box) return;

  const indentBars = Array.from({ length: depth + 1 }, () =>
    `<div class="comment-indent-bar"></div>`).join('');
  const indentHtml = `<div class="comment-indent">${indentBars}</div>`;

  box.innerHTML = `
    <div class="comment-item" style="padding-top:2px">
      ${indentHtml}
      <div class="comment-body">
        <div class="comment-reply-box">
          <textarea class="comment-reply-input" id="ri-${parentCommentId}"
                 placeholder="Write a reply… (Enter to post, Shift+Enter for new line)" maxlength="1000" rows="1"
                 onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postReply(${taskId},${parentCommentId})}if(event.key==='Escape')cancelReply(${parentCommentId})"
                 oninput="autoResize(this)"></textarea>
          <button class="btn-post-reply" onclick="postReply(${taskId},${parentCommentId})">↵ Reply</button>
          <button class="btn-cancel-reply" onclick="cancelReply(${parentCommentId})">✕</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById(`ri-${parentCommentId}`)?.focus(), 30);
}

function postReply(taskId, parentCommentId) {
  const inp  = document.getElementById(`ri-${parentCommentId}`);
  const text = inp?.value.trim();
  if (!text) { inp?.focus(); return; }
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.comments) t.comments = [];
  t.comments.push({ id: Date.now(), text, parentId: parentCommentId, created: new Date().toISOString() });
  save();
  refreshCommentPanel(t);
}

function cancelReply(parentCommentId) {
  const box = document.getElementById(`reply-box-${parentCommentId}`);
  if (box) box.innerHTML = '';
}

function addComment(taskId) {
  const inp  = document.getElementById(`ci-${taskId}`);
  const text = inp?.value.trim();
  if (!text) { inp?.focus(); return; }
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.comments) t.comments = [];
  t.comments.push({ id: Date.now(), text, parentId: null, created: new Date().toISOString() });
  save();
  refreshCommentPanel(t);
  setTimeout(() => {
    const ta = document.getElementById(`ci-${taskId}`);
    if (ta) { ta.value = ''; autoResize(ta); ta.focus(); }
  }, 20);
}

function deleteComment(taskId, commentId) {
  const t = tasks.find(t => t.id === taskId);
  if (!t || !t.comments) return;
  // Delete comment and all its descendants
  const toDelete = new Set();
  const collect = id => {
    toDelete.add(id);
    t.comments.filter(c => c.parentId === id).forEach(c => collect(c.id));
  };
  collect(commentId);
  t.comments = t.comments.filter(c => !toDelete.has(c.id));
  save();
  refreshCommentPanel(t);
}

function refreshCommentPanel(t) {
  const panel = document.getElementById(`tc-${t.id}`);
  if (panel) panel.innerHTML = commentsInnerHTML(t);
  const btn = document.querySelector(`[data-taskid="${t.id}"] .btn-comment`);
  if (btn) {
    const cnt = t.comments?.length || 0;
    btn.textContent = cnt > 0 ? `💬 ${cnt}` : '💬 Comment';
    btn.classList.toggle('has-comments', cnt > 0);
  }
}

// ── Comment inline edit ──
function startEditComment(taskId, commentId) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  const c = t.comments.find(c => c.id === commentId);
  if (!c) return;
  const textEl = document.getElementById(`ctxt-${commentId}`);
  if (!textEl || textEl.querySelector('textarea')) return;
  const wrap = document.createElement('div');
  wrap.className = 'comment-edit-wrap';
  wrap.innerHTML = `
    <textarea class="comment-edit-input" id="cedit-${commentId}" maxlength="1000" rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEditComment(${taskId},${commentId})}if(event.key==='Escape')cancelEditComment(${taskId})"
              oninput="autoResize(this)">${esc(c.text)}</textarea>
    <button class="btn-save-comment" onclick="saveEditComment(${taskId},${commentId})">✓</button>`;
  textEl.replaceWith(wrap);
  const ta = document.getElementById(`cedit-${commentId}`);
  if (ta) { autoResize(ta); ta.focus(); ta.select(); }
}

function saveEditComment(taskId, commentId) {
  const inp = document.getElementById(`cedit-${commentId}`);
  const newText = inp?.value.trim();
  if (!newText) return;
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  const c = t.comments.find(c => c.id === commentId);
  if (!c) return;
  c.text   = newText;
  c.edited = true;
  save();
  refreshCommentPanel(t);
}

function cancelEditComment(taskId) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  refreshCommentPanel(t);
}

function toggleComments(e, taskId) {
  e.stopPropagation();
  const isOpen = openComments.has(taskId);
  if (isOpen) {
    // Close it
    openComments.delete(taskId);
    const panel = document.getElementById(`tc-${taskId}`);
    const item  = panel?.closest('.task-card')?.querySelector('.task-item');
    if (panel) panel.classList.remove('open');
    if (item)  item.classList.remove('comments-open');
  } else {
    // Close other meta panels, then open
    closeAllMeta(taskId, 'comment');
    openComments.add(taskId);
    const panel = document.getElementById(`tc-${taskId}`);
    const item  = panel?.closest('.task-card')?.querySelector('.task-item');
    if (panel) panel.classList.add('open');
    if (item)  item.classList.add('comments-open');
    setTimeout(() => document.getElementById(`ci-${taskId}`)?.focus(), 50);
  }
}

// ── Close all meta panels for a task ──
function closeAllMeta(taskId, except) {
  // Priority popup
  if (except !== 'priority') {
    const pp = document.getElementById(`prip-${taskId}`);
    if (pp) pp.classList.remove('open');
  }
  // Period popup
  if (except !== 'period') closeAllPopups();
  // Comments
  if (except !== 'comment') {
    const panel = document.getElementById(`tc-${taskId}`);
    const item  = panel?.closest('.task-card')?.querySelector('.task-item');
    if (panel) { panel.classList.remove('open'); openComments.delete(taskId); }
    if (item)  item.classList.remove('comments-open');
  }
  // Dates row
  if (except !== 'dates') {
    const row = document.getElementById(`tdr-${taskId}`);
    const btn = document.getElementById(`tdb-${taskId}`);
    if (row) row.style.display = 'none';
    if (btn) btn.style.color = '';
  }
}

// ── Priority popup ──
function togglePriorityPopup(e, taskId) {
  e.stopPropagation();
  const pp = document.getElementById(`prip-${taskId}`);
  if (!pp) return;
  const isOpen = pp.classList.contains('open');
  closeAllMeta(taskId, 'priority');
  document.querySelectorAll('.priority-popup.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) { pp.classList.add('open'); document.querySelector(`.task-item[data-taskid="${taskId}"]`).style.zIndex = '50'; }
  else { document.querySelector(`.task-item[data-taskid="${taskId}"]`).style.zIndex = ''; }
}

function setPriority(e, taskId, priority) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  t.priority = priority;
  save();
  // Close popup and patch tag in place
  const pp = document.getElementById(`prip-${taskId}`);
  if (pp) pp.classList.remove('open');
  const item = document.querySelector(`.task-item[data-taskid="${taskId}"]`);
  if (item) {
    item.dataset.priority = priority;
    const tag = item.querySelector('.tag.clickable');
    if (tag) {
      tag.className = `tag tag-${priority} clickable`;
      // Remove old popup and re-insert fresh one (so onclick IDs stay correct)
    }
  }
  // Lightweight re-render of just this task card
  renderTasks();
}

// ── Task name inline edit ──
// ── Reassign criteria / sub-criteria ──
function toggleReassign(e, taskId) {
  e.stopPropagation();
  const pp = document.getElementById(`rp-${taskId}`);
  if (!pp) return;
  const isOpen = pp.classList.contains('open');
  document.querySelectorAll('.reassign-popup.open').forEach(p => {
    p.classList.remove('open');
    const item = p.closest('.task-item');
    if (item) item.style.zIndex = '';
  });
  document.querySelectorAll('.priority-popup.open').forEach(p => p.classList.remove('open'));
  closeAllPopups();
  if (!isOpen) {
    pp.classList.add('open');
    const item = pp.closest('.task-item');
    if (item) item.style.zIndex = '50';
  }
}

function updateReassignSub(taskId) {
  const critSel = document.getElementById(`rp-crit-${taskId}`);
  const subSel  = document.getElementById(`rp-sub-${taskId}`);
  if (!critSel || !subSel) return;
  const cid  = parseInt(critSel.value) || null;
  const crit = criteria.find(c => c.id === cid);
  subSel.innerHTML = `<option value="">— None —</option>` +
    (crit?.subcriteria||[]).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
}

function applyReassign(e, taskId) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  const critSel = document.getElementById(`rp-crit-${taskId}`);
  const subSel  = document.getElementById(`rp-sub-${taskId}`);
  t.criteriaId    = parseInt(critSel?.value) || null;
  t.subcriteriaId = parseInt(subSel?.value)  || null;
  save();
  document.querySelectorAll('.reassign-popup.open').forEach(p => {
    p.classList.remove('open');
    const item = p.closest('.task-item');
    if (item) item.style.zIndex = '';
  });
  renderTasks();
  if (currentView === 'completed') renderCompleted();
}

function editTaskName(e, taskId) {
  e.stopPropagation();
  const nameEl = document.getElementById(`tname-${taskId}`);
  if (!nameEl || nameEl.tagName === 'TEXTAREA') return;
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;

  const ta = document.createElement('textarea');
  ta.className   = 'task-name-input';
  ta.value       = t.text;
  ta.maxLength   = 200;
  ta.rows        = 1;
  ta.setAttribute('onkeydown',
    `if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveTaskName(${taskId},this)}` +
    `if(event.key==='Escape')cancelTaskName(${taskId})`);
  ta.setAttribute('oninput', 'autoResize(this)');
  ta.setAttribute('onblur', `saveTaskName(${taskId},this)`);
  nameEl.replaceWith(ta);
  autoResize(ta);
  ta.focus();
  ta.select();
}

function saveTaskName(taskId, el) {
  const newText = (el?.value || '').trim();
  if (!newText) { el?.focus(); return; }
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  t.text = newText;
  save();
  renderTasks();
  if (currentView === 'completed') renderCompleted();
}

function cancelTaskName(taskId) {
  renderTasks();
  if (currentView === 'completed') renderCompleted();
}
function toggleTaskDates(e, taskId) {
  e.stopPropagation();
  const row = document.getElementById(`tdr-${taskId}`);
  const btn = document.getElementById(`tdb-${taskId}`);
  if (!row) return;
  const isOpen = row.style.display === 'flex';
  if (isOpen) {
    row.style.display = 'none';
    if (btn) btn.style.color = '';
  } else {
    closeAllMeta(taskId, 'dates');
    row.style.display = 'flex';
    if (btn) btn.style.color = 'var(--accent)';
  }
}

// ── Task Date inline edit ──
function editTaskDate(e, taskId, field) {
  e.stopPropagation();
  const elId  = field === 'taskDate' ? `td-task-${taskId}` : `td-done-${taskId}`;
  const span  = document.getElementById(elId);
  if (!span || span.querySelector('input')) return;

  const t       = tasks.find(t => t.id === taskId);
  const current = t?.[field] || '';

  const inp = document.createElement('input');
  inp.type  = 'date';
  inp.className = 'task-date-input';
  inp.value = current;
  span.replaceWith(inp);
  inp.focus();

  const commit = () => {
    const val = inp.value || null;
    if (t) {
      t[field] = val;
      // if setting completedDate, also mark done status
      if (field === 'completedDate') t.done = !!val;
      save();
    }
    renderTasks();
    updateGlobalStats();
    updateDoneBadge();
    if (currentView === 'completed') renderCompleted();
  };

  inp.addEventListener('change', commit);
  inp.addEventListener('blur',   commit);
  inp.addEventListener('keydown', ev => { if (ev.key === 'Escape') renderTasks(); });
}
function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ═══════════════════════════════════════════════════
// RENDER COMPLETED
// ═══════════════════════════════════════════════════
let openDoneGroups    = new Set();
let openDoneSubgroups = new Set();
let openTaskGroups    = new Set();
let openTaskSubgroups = new Set();
let openComments      = new Set();

function toggleDoneGroup(groupId) {
  openDoneGroups.has(groupId) ? openDoneGroups.delete(groupId) : openDoneGroups.add(groupId);
  const el = document.querySelector(`.done-group[data-gid="${groupId}"]`);
  if (el) el.classList.toggle('open', openDoneGroups.has(groupId));
}

function toggleDoneSubgroup(subId) {
  openDoneSubgroups.has(subId) ? openDoneSubgroups.delete(subId) : openDoneSubgroups.add(subId);
  const el = document.querySelector(`.done-subgroup[data-sgid="${subId}"]`);
  if (el) el.classList.toggle('open', openDoneSubgroups.has(subId));
}

function clearDoneSearch() {
  const inp = document.getElementById('doneSearch');
  if (inp) inp.value = '';
  const btn = document.getElementById('doneSearchClear');
  if (btn) btn.classList.remove('visible');
  renderCompleted();
}

function renderCompleted() {
  const list = document.getElementById('completedList');
  if (!list) return;

  // Search query
  const searchEl = document.getElementById('doneSearch');
  const query = searchEl ? searchEl.value.trim().toLowerCase() : '';
  const clearBtn = document.getElementById('doneSearchClear');
  if (clearBtn) clearBtn.classList.toggle('visible', query.length > 0);

  let done = tasks.filter(t => t.done);

  // Filter by search
  if (query) {
    done = done.filter(t => {
      const crit = criteria.find(c => c.id === t.criteriaId);
      const sub  = crit ? crit.subcriteria.find(s => s.id === t.subcriteriaId) : null;
      return t.text.toLowerCase().includes(query)
        || (crit && crit.name.toLowerCase().includes(query))
        || (sub  && sub.name.toLowerCase().includes(query));
    });
  }

  if (done.length === 0) {
    list.innerHTML = query
      ? `<div class="empty"><div class="empty-icon">🔍</div>No completed tasks match "<strong>${esc(query)}</strong>".</div>`
      : `<div class="empty"><div class="empty-icon">✅</div>No completed tasks yet.<br>Complete a task and it'll show up here.</div>`;
    return;
  }

  const groups = [];

  criteria.forEach(c => {
    const critTasks = done.filter(t => t.criteriaId === c.id);
    if (critTasks.length === 0) return;

    const subGroups = [];
    c.subcriteria.forEach(s => {
      const subTasks = critTasks.filter(t => t.subcriteriaId === s.id);
      if (subTasks.length > 0) subGroups.push({ id: `${c.id}-${s.id}`, label: s.name, tasks: subTasks });
    });
    const noSub = critTasks.filter(t => !t.subcriteriaId);
    if (noSub.length > 0) subGroups.push({ id: `${c.id}-none`, label: null, tasks: noSub });

    groups.push({ id: String(c.id), emoji: c.emoji, name: c.name, count: critTasks.length, subGroups });
  });

  const unassigned = done.filter(t => !t.criteriaId);
  if (unassigned.length > 0) {
    groups.push({ id: 'unassigned', emoji: '📌', name: 'Unassigned', count: unassigned.length,
      subGroups: [{ id: 'unassigned-none', label: null, tasks: unassigned }] });
  }

  list.innerHTML = groups.map(g => {
    // Auto-open everything when searching
    const isOpen = query ? true : openDoneGroups.has(g.id);
    const subLabels = g.subGroups.filter(sg => sg.label).map(sg => esc(sg.label)).join(' · ');
    const preview = subLabels
      ? `<span style="font-family:JetBrains Mono,monospace;font-size:0.58rem;color:var(--muted);margin-left:4px">${subLabels}</span>`
      : '';

    const subGroupsHtml = g.subGroups.map(sg => {
      const sgOpen = query ? true : openDoneSubgroups.has(sg.id);

      if (!sg.label) {
        // No sub-criteria label — render tasks directly (no inner accordion)
        return `
          <div class="done-subgroup open" data-sgid="${sg.id}">
            <div class="done-subgroup-body">
              <div class="done-subgroup-tasks">${sg.tasks.map(t => doneTaskCard(t)).join('')}</div>
            </div>
          </div>`;
      }

      return `
        <div class="done-subgroup${sgOpen ? ' open' : ''}" data-sgid="${sg.id}">
          <div class="done-subgroup-header" onclick="toggleDoneSubgroup('${sg.id}')">
            ▸ ${esc(sg.label)}
            <span class="done-subgroup-count">${sg.tasks.length} done</span>
            <span class="done-subgroup-chevron">▶</span>
          </div>
          <div class="done-subgroup-body">
            <div class="done-subgroup-tasks">${sg.tasks.map(t => doneTaskCard(t)).join('')}</div>
          </div>
        </div>`;
    }).join('');

    return `
    <div class="done-group${isOpen ? ' open' : ''}" data-gid="${g.id}">
      <div class="done-group-header" onclick="toggleDoneGroup('${g.id}')">
        <span class="done-group-icon">${esc(g.emoji)}</span>
        <span class="done-group-name">${esc(g.name)}</span>
        ${preview}
        <span class="done-group-count">${g.count} done</span>
        <span class="done-group-chevron">▶</span>
      </div>
      <div class="done-group-body">${subGroupsHtml}</div>
    </div>`;
  }).join('');
}

function highlightMatch(text, query) {
  if (!query) return esc(text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx))
    + `<mark style="background:rgba(245,166,35,0.3);color:var(--accent);border-radius:2px;padding:0 1px">${esc(text.slice(idx, idx + query.length))}</mark>`
    + esc(text.slice(idx + query.length));
}

function doneTaskCard(t) {

function renderFilterBar() {

// ═══════════════════════════════════════════════════
// PERIOD POPUP
// ═══════════════════════════════════════════════════
function togglePopup(e, id) {
  e.stopPropagation();
  closeAllMeta(id, 'period');
  closeAllPopups(id);
  const pp = document.getElementById(`pp-${id}`);
  if (!pp) return;
  const taskItem = pp.closest('.task-item');
  const isOpen = pp.classList.contains('open');
  if (isOpen) {
    pp.classList.remove('open');
    if (taskItem) taskItem.style.zIndex = '';
    openPopupId = null;
  } else {
    pp.classList.add('open');
    if (taskItem) taskItem.style.zIndex = '50';
    openPopupId = id;
  }
}

function pickPeriod(e, id, period) {
  e.stopPropagation();
  if (period === 'custom-show') {
    const d = document.getElementById(`pp-dates-${id}`);
    if (d) d.style.display = 'flex';
    return;
  }
  setTaskPeriod(id, period, null, null);
  closeAllPopups();
}

function applyCustom(e, id) {
  e.stopPropagation();
  const s = document.getElementById(`pp-s-${id}`)?.value || null;
  const en = document.getElementById(`pp-e-${id}`)?.value || null;
  setTaskPeriod(id, 'custom', s, en);
  closeAllPopups();
}

function closeAllPopups(except) {
  document.querySelectorAll('.period-popup').forEach(p => {
    if (parseInt(p.dataset.taskid) !== except) {
      p.classList.remove('open');
      const taskItem = p.closest('.task-item');
      if (taskItem) taskItem.style.zIndex = '';
    }
  });
  if (!except) openPopupId = null;
}

document.addEventListener('click', () => {
  closeAllPopups();
  document.querySelectorAll('.priority-popup.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.reassign-popup.open').forEach(p => {
    p.classList.remove('open');
    const item = p.closest('.task-item');
    if (item) item.style.zIndex = '';
  });
});

// ═══════════════════════════════════════════════════
// DASHBOARD TIME CONTROLS
// ═══════════════════════════════════════════════════
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function setDashMode(mode, btn) {
  dashMode = mode;
  document.querySelectorAll('.dash-mode-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const nav = document.getElementById('dashNav');
  nav.style.display = mode === 'all' ? 'none' : 'flex';

  // Show month selector only in monthly mode
  const msel = document.getElementById('dashMonthSelect');
  if (msel) {
    msel.style.display = mode === 'monthly' ? '' : 'none';
    msel.value = dashMonth;
  }

  // Set year input
  const yi = document.getElementById('dashYearInput');
  if (yi) yi.value = dashYear;

  renderDashboard();
}

function setDashYear(val) {
  const y = parseInt(val);
  if (y >= 2000 && y <= 2099) { dashYear = y; renderDashboard(); }
}

function navigateDash(dir) {
  // kept for compatibility but not used in current UI
  dashMonth = (dashMonth + dir + 12) % 12;
  renderDashboard();
}

function getDashTasks() {
  if (dashMode === 'all') return tasks;
  return tasks.filter(t => {
    // Use completedDate for done tasks, taskDate for active, fallback to created
    const dateStr = t.done
      ? (t.completedDate || t.taskDate || t.created?.slice(0, 10))
      : (t.taskDate || t.created?.slice(0, 10));
    const d = new Date(dateStr);
    if (dashMode === 'monthly') return d.getFullYear() === dashYear;
    if (dashMode === 'yearly')  return d.getFullYear() === dashYear;
    return true;
  });
}

// ═══════════════════════════════════════════════════
// RENDER DASHBOARD
// ═══════════════════════════════════════════════════
function renderDashboard() {
  // Sync year input
  const yi = document.getElementById('dashYearInput');
  if (yi && !yi.value) yi.value = dashYear;

  const ts    = getDashTasks();
  const total  = ts.length;
  const done   = ts.filter(t => t.done).length;
  const pct    = total ? Math.round((done / total) * 100) : 0;
  const C      = 2 * Math.PI * 35;
  const pending = total - done;
  const high    = ts.filter(t => t.priority === 'high').length;

  // Title for activity card
  const titleEl = document.getElementById('dashActivityTitle');
  const tableEl = document.getElementById('dashMonthlyTable');
  const chartEl = document.getElementById('dashActivityChartWrap');

  if (dashMode === 'monthly') {
    if (titleEl) titleEl.textContent = `${MONTHS_FULL[dashMonth]} ${dashYear} — Day by Day`;
    if (tableEl) { tableEl.style.display = ''; renderMonthlyTable(tableEl); }
    if (chartEl) chartEl.style.display = 'none';
    const dayWrap = document.getElementById('dashDayChartWrap');
    const tableYear = document.getElementById('dashTableYear');
    if (dayWrap) dayWrap.style.display = '';
    if (tableYear) tableYear.textContent = dashYear;
    renderDayChart();
  } else {
    if (titleEl) titleEl.textContent = dashMode === 'yearly' ? `Tasks by Month — ${dashYear}` : 'Activity — All Time';
    if (tableEl) tableEl.style.display = 'none';
    if (chartEl) chartEl.style.display = '';
    const dayWrap = document.getElementById('dashDayChartWrap');
    if (dayWrap) dayWrap.style.display = 'none';
    renderActivityChart(ts);
  }

  // Summary pills
  document.getElementById('dashSummaryRow').innerHTML = `
    <div class="dash-summary-pill"><div class="dash-summary-num">${total}</div><div class="dash-summary-lbl">Total</div></div>
    <div class="dash-summary-pill"><div class="dash-summary-num" style="color:#4caf80">${done}</div><div class="dash-summary-lbl">Done</div></div>
    <div class="dash-summary-pill"><div class="dash-summary-num" style="color:var(--muted)">${pending}</div><div class="dash-summary-lbl">Pending</div></div>
    <div class="dash-summary-pill"><div class="dash-summary-num" style="color:#e74c3c">${high}</div><div class="dash-summary-lbl">⚡ High Pri.</div></div>
  `;

  // Completion ring
  document.getElementById('ringPct').textContent  = pct + '%';
  document.getElementById('ringDesc').textContent = `${done} of ${total} tasks done`;
  const ring = document.getElementById('ringCircle');
  if (ring) {
    ring.setAttribute('stroke-dasharray', C.toFixed(1));
    ring.setAttribute('stroke-dashoffset', (C - (pct / 100) * C).toFixed(1));
  }

  // Priority
  const priData = [
    { label:'High',   key:'high',   color:'#e74c3c' },
    { label:'Medium', key:'medium', color:'#f0a500' },
    { label:'Low',    key:'low',    color:'#5dade2' },
    { label:'N/A',    key:'na',     color:'#9090a8' }
  ];
  const maxP = Math.max(1, ...priData.map(p => ts.filter(t=>t.priority===p.key).length));
  document.getElementById('dashPriority').innerHTML = priData.map(p => {
    const cnt = ts.filter(t=>t.priority===p.key).length;
    const dn  = ts.filter(t=>t.priority===p.key&&t.done).length;
    return barRow(p.label, `${cnt} tasks · ${dn} done`, Math.round(cnt/maxP*100), p.color);
  }).join('') || noData();

  // Period
  const perData = [
    { label:'Custom', key:'custom', color:'#fb7185' },
    { label:'N/A',    key:'na',     color:'#9090a8' }
  ];
  const maxPer = Math.max(1, ...perData.map(p => ts.filter(t=>t.period===p.key).length));
  document.getElementById('dashPeriod').innerHTML = perData.map(p => {
    const cnt = ts.filter(t=>t.period===p.key).length;
    return barRow(p.label, `${cnt} task${cnt!==1?'s':''}`, Math.round(cnt/maxPer*100), p.color);
  }).join('') || noData();

  // Criteria
  const unassigned = ts.filter(t=>!t.criteriaId).length;
  const critCounts = criteria.map(c => ({
    label: c.emoji+' '+c.name,
    cnt:  ts.filter(t=>t.criteriaId===c.id).length,
    done: ts.filter(t=>t.criteriaId===c.id&&t.done).length
  })).filter(x=>x.cnt>0);
  if (unassigned > 0) critCounts.push({ label:'Unassigned', cnt:unassigned, done:0, color:'var(--muted)' });
  const maxC = Math.max(1, ...critCounts.map(x=>x.cnt));
  document.getElementById('dashCriteria').innerHTML = critCounts.length
    ? critCounts.map(x => barRow(x.label, `${x.cnt} tasks · ${x.done||0} done`, Math.round(x.cnt/maxC*100), x.color||'var(--accent)')).join('')
    : noData();

  // Sub-criteria
  const subRows = [];
  criteria.forEach(c => {
    c.subcriteria.forEach(s => {
      const cnt = ts.filter(t=>t.subcriteriaId===s.id).length;
      const dn  = ts.filter(t=>t.subcriteriaId===s.id&&t.done).length;
      if (cnt > 0) subRows.push({ label: c.emoji+' '+c.name+' › '+s.name, cnt, done: dn });
    });
  });
  const maxS = Math.max(1, ...subRows.map(x=>x.cnt));
  document.getElementById('dashSubcriteria').innerHTML = subRows.length
    ? subRows.sort((a,b)=>b.cnt-a.cnt).map(x => barRow(x.label, `${x.cnt} tasks · ${x.done} done`, Math.round(x.cnt/maxS*100), 'var(--accent2)')).join('')
    : '<div class="bar-val" style="color:var(--muted);font-family:JetBrains Mono,monospace;font-size:0.7rem">No sub-criteria usage yet</div>';
}

function noData() {
  return '<div class="bar-val" style="color:var(--muted);font-family:JetBrains Mono,monospace;font-size:0.7rem">No tasks yet</div>';
}

// ═══════════════════════════════════════════════════
// MONTHLY TABLE (12 months of selected year)
// ═══════════════════════════════════════════════════
function renderMonthlyTable(container) {
  const curMonth = new Date().getMonth();
  const curYear  = new Date().getFullYear();

  let totalAll = 0, doneAll = 0, pendingAll = 0, highAll = 0;

  const rows = MONTHS_FULL.map((mName, m) => {
    const mTasks = tasks.filter(t => {
      const d = new Date(taskEffectiveDate(t));
      return d.getFullYear() === dashYear && d.getMonth() === m;
    });
    const tot  = mTasks.length;
    const dn   = mTasks.filter(t => t.done).length;
    const pend = tot - dn;
    const hi   = mTasks.filter(t => t.priority === 'high').length;
    const pct  = tot ? Math.round((dn / tot) * 100) : null;

    totalAll   += tot;
    doneAll    += dn;
    pendingAll += pend;
    highAll    += hi;

    const isCur = dashYear === curYear && m === curMonth;
    const zero  = cls => tot === 0 ? 'mtd-zero' : cls;

    return `<tr class="${isCur ? 'cur-month' : ''}">
      <td class="mtd-month">${mName}</td>
      <td class="${zero('')}">${tot || '—'}</td>
      <td class="${tot ? 'mtd-done' : 'mtd-zero'}">${dn || (tot ? '0' : '—')}</td>
      <td class="${zero('')}">${tot ? pend : '—'}</td>
      <td class="${hi > 0 ? 'mtd-high' : zero('')}">${hi || (tot ? '0' : '—')}</td>
      <td class="${pct !== null ? 'mtd-pct' : 'mtd-zero'}">${pct !== null ? pct + '%' : '—'}</td>
    </tr>`;
  }).join('');

  const totalPct = totalAll ? Math.round((doneAll / totalAll) * 100) : null;

  container.innerHTML = `
    <table class="month-table">
      <thead>
        <tr>
          <th>Month</th>
          <th>Total</th>
          <th>Done</th>
          <th>Pending</th>
          <th>⚡ High</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr class="tfoot-row">
          <td>Total ${dashYear}</td>
          <td>${totalAll || '—'}</td>
          <td>${doneAll || (totalAll ? '0' : '—')}</td>
          <td>${pendingAll || (totalAll ? '0' : '—')}</td>
          <td>${highAll || (totalAll ? '0' : '—')}</td>
          <td>${totalPct !== null ? totalPct + '%' : '—'}</td>
        </tr>
      </tfoot>
    </table>`;
}

// ═══════════════════════════════════════════════════
// DAY-BY-DAY CHART
// ═══════════════════════════════════════════════════
function renderDayChart() {
  const el = document.getElementById('dashDayActivity');
  if (!el) return;

  const daysInMonth = new Date(dashYear, dashMonth + 1, 0).getDate();
  const today = new Date();
  const buckets = [];

  for (let d = 1; d <= daysInMonth; d++) {
    const done = tasks.filter(t => {
      const ds = new Date(taskEffectiveDate(t));
      return t.done && ds.getFullYear()===dashYear && ds.getMonth()===dashMonth && ds.getDate()===d;
    }).length;
    const active = tasks.filter(t => {
      const ds = new Date(taskEffectiveDate(t));
      return !t.done && ds.getFullYear()===dashYear && ds.getMonth()===dashMonth && ds.getDate()===d;
    }).length;
    // Label: show day number every 5 days, always show 1st
    const isToday = today.getFullYear()===dashYear && today.getMonth()===dashMonth && today.getDate()===d;
    const label = d===1 || d%5===0 ? String(d) : '';
    buckets.push({ d, done, active, total: done+active, label, isToday });
  }

  const maxVal = Math.max(1, ...buckets.map(b => b.total));
  const BAR_H  = 60;

  el.innerHTML = buckets.map(b => {
    const hDone   = Math.max(b.done   > 0 ? 3 : 0, Math.round((b.done   / maxVal) * BAR_H));
    const hActive = Math.max(b.active > 0 ? 3 : 0, Math.round((b.active / maxVal) * BAR_H));
    const todayStyle = b.isToday ? 'outline:1px solid var(--accent);outline-offset:1px;border-radius:3px;' : '';
    return `<div class="activity-bar-wrap" title="Day ${b.d}: ${b.done} completed, ${b.active} active" style="${todayStyle}">
      <div class="activity-bars">
        <div class="activity-bar bar-done"   style="height:${hDone}px"></div>
        <div class="activity-bar bar-active" style="height:${hActive}px"></div>
      </div>
      <div class="activity-bar-label">${b.isToday ? '•' : b.label}</div>
    </div>`;
  }).join('');
}

function taskEffectiveDate(t) {
  return t.done
    ? (t.completedDate || t.taskDate || t.created?.slice(0,10))
    : (t.taskDate || t.created?.slice(0,10));
}

function renderActivityChart(ts) {
  const el    = document.getElementById('dashActivity');
  const title = document.getElementById('dashActivityTitle');
  if (!el) return;

  let buckets = [];

  const countBucket = (filterFn) => {
    const done   = tasks.filter(t =>  t.done && filterFn(t)).length;
    const active = tasks.filter(t => !t.done && filterFn(t)).length;
    return { done, active, total: done + active };
  };

  if (dashMode === 'yearly') {
    title.textContent = `Tasks by Month — ${dashYear}`;
    for (let m = 0; m < 12; m++) {
      const b = countBucket(t => {
        const td = new Date(taskEffectiveDate(t));
        return td.getFullYear()===dashYear && td.getMonth()===m;
      });
      buckets.push({ label: MONTHS[m], ...b });
    }
  } else {
    // All time
    const allYears = [...new Set(tasks.map(t => new Date(taskEffectiveDate(t)).getFullYear()).filter(y => !isNaN(y)))].sort();
    if (allYears.length === 0) {
      el.innerHTML = '<div style="color:var(--muted);font-family:JetBrains Mono,monospace;font-size:0.7rem">No data yet</div>';
      return;
    }
    if (allYears.length <= 2) {
      title.textContent = 'Monthly Activity — All Time';
      const minYear = allYears[0], maxYear = allYears[allYears.length-1];
      for (let y = minYear; y <= maxYear; y++) {
        for (let m = 0; m < 12; m++) {
          if (y === maxYear && m > new Date().getMonth()) break;
          const b = countBucket(t => {
            const td = new Date(taskEffectiveDate(t));
            return td.getFullYear()===y && td.getMonth()===m;
          });
          buckets.push({ label: MONTHS[m].slice(0,1)+(y!==minYear?'`'+String(y).slice(2):''), ...b });
        }
      }
    } else {
      title.textContent = 'Yearly Activity — All Time';
      allYears.forEach(y => {
        const b = countBucket(t => new Date(taskEffectiveDate(t)).getFullYear()===y);
        buckets.push({ label: String(y), ...b });
      });
    }
  }

  const maxVal = Math.max(1, ...buckets.map(b => b.total));
  const BAR_H  = 64;

  el.innerHTML = buckets.map(b => {
    const hDone   = Math.max(b.done   > 0 ? 3 : 0, Math.round((b.done   / maxVal) * BAR_H));
    const hActive = Math.max(b.active > 0 ? 3 : 0, Math.round((b.active / maxVal) * BAR_H));
    const tip = `${b.done} completed, ${b.active} active`;
    return `<div class="activity-bar-wrap" title="${tip}">
      <div class="activity-bars">
        <div class="activity-bar bar-done"   style="height:${hDone}px"></div>
        <div class="activity-bar bar-active" style="height:${hActive}px"></div>
      </div>
      <div class="activity-bar-label">${b.label}</div>
    </div>`;
  }).join('');
}

function barRow(name, val, pct, color) {
  return `<div class="bar-row">
    <div class="bar-label">
      <span class="bar-name">${esc(String(name))}</span>
      <span class="bar-val">${esc(String(val))}</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// RENDER CRITERIA
// ═══════════════════════════════════════════════════
function renderCriteria() {
  const list = document.getElementById('criteriaList');

  if (criteria.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🏷️</div>No criteria yet.<br>Add one above.</div>`;
    return;
  }

  list.innerHTML = criteria.map((c, ci) => {
    const taskCount = tasks.filter(t=>t.criteriaId===c.id).length;
    return `
    <div class="criteria-card" data-cid="${c.id}">
      <div class="criteria-card-header">
        <span class="criteria-emoji">${esc(c.emoji)}</span>
        <span class="criteria-name" id="cname-${c.id}" onclick="editCriteriaName(${c.id})" title="Click to rename">${esc(c.name)}</span>
        <span class="criteria-meta">${taskCount} task${taskCount!==1?'s':''}</span>
        <button class="btn-icon del" onclick="deleteCriteria(${c.id})" title="Delete">✕</button>
      </div>
      <div class="subcriteria-list">
        ${c.subcriteria.map((s, si) => `
          <span class="sub-chip">
            <span class="sub-chip-name" id="sname-${c.id}-${s.id}" onclick="editSubName(${c.id},${s.id})" title="Click to rename">${esc(s.name)}</span>
            <button class="del-sub" onclick="deleteSubcriteria(${c.id},${s.id})" title="Remove">×</button>
          </span>`).join('')}
        ${c.subcriteria.length===0 ? '<span style="font-family:JetBrains Mono,monospace;font-size:0.6rem;color:var(--muted)">No sub-criteria yet</span>' : ''}
      </div>
      <div class="sub-add-row">
        <input type="text" id="sub-${c.id}" placeholder="Add sub-criteria…" maxlength="30"
               onkeydown="if(event.key==='Enter')addSub(${c.id})" />
        <button class="btn-sm" onclick="addSub(${c.id})">+ Sub</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
// CRITERIA CRUD
// ═══════════════════════════════════════════════════
function addCriteria() {
  const emoji = document.getElementById('newCriteriaEmoji').value.trim() || '🏷️';
  const name  = document.getElementById('newCriteriaName').value.trim();
  if (!name) { document.getElementById('newCriteriaName').focus(); return; }
  if (criteria.some(c => c.name.toLowerCase() === name.toLowerCase())) {
    showToast(`⚠️ "${name}" already exists as a criteria.`); return;
  }
  criteria.push({ id: Date.now(), name, emoji, subcriteria: [] });
  document.getElementById('newCriteriaEmoji').value = '';
  document.getElementById('newCriteriaName').value  = '';
  save(); populateCriteriaSelect(); renderCriteria();
}

function deleteCriteria(id) {
  const c = criteria.find(x=>x.id===id);
  const used = tasks.filter(t=>t.criteriaId===id).length;
  const msg = used > 0
    ? `Delete "${c?.name}"? ${used} task${used!==1?'s':''} will become unassigned.`
    : `Delete "${c?.name}"? This cannot be undone.`;
  if (!confirm(msg)) return;
  tasks.forEach(t => { if (t.criteriaId===id) { t.criteriaId=null; t.subcriteriaId=null; } });
  criteria = criteria.filter(c=>c.id!==id);
  save(); populateCriteriaSelect(); renderCriteria(); renderTasks(); updateGlobalStats();
}

function addSub(cid) {
  const inp  = document.getElementById(`sub-${cid}`);
  const name = inp?.value.trim();
  if (!name) { inp?.focus(); return; }
  const c = criteria.find(x=>x.id===cid);
  if (!c) return;
  if (c.subcriteria.some(s => s.name.toLowerCase() === name.toLowerCase())) {
    showToast(`⚠️ "${name}" already exists in ${c.name}.`); return;
  }
  c.subcriteria.push({ id: Date.now(), name });
  save(); inp.value=''; populateCriteriaSelect(); renderCriteria();
}

function deleteSubcriteria(cid, sid) {
  const c = criteria.find(x=>x.id===cid);
  if (!c) return;
  const s = c.subcriteria.find(x=>x.id===sid);
  const used = tasks.filter(t=>t.subcriteriaId===sid).length;
  const msg = used > 0
    ? `Delete "${s?.name}"? ${used} task${used!==1?'s':''} will lose this sub-criteria.`
    : `Delete "${s?.name}"?`;
  if (!confirm(msg)) return;
  c.subcriteria = c.subcriteria.filter(s=>s.id!==sid);
  tasks.forEach(t => { if (t.subcriteriaId===sid) t.subcriteriaId=null; });
  save(); populateCriteriaSelect(); renderCriteria(); renderTasks();
}

// ── Criteria & sub-criteria inline name edit ──
function editCriteriaName(cid) {
  const span = document.getElementById(`cname-${cid}`);
  if (!span || span.querySelector('input')) return;
  const c = criteria.find(x=>x.id===cid);
  if (!c) return;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'criteria-name-input';
  inp.value = c.name; inp.maxLength = 40;
  inp.onkeydown = e => {
    if (e.key === 'Enter') saveCriteriaName(cid, inp.value);
    if (e.key === 'Escape') renderCriteria();
  };
  inp.onblur = () => saveCriteriaName(cid, inp.value);
  span.replaceWith(inp);
  inp.focus(); inp.select();
}

function saveCriteriaName(cid, val) {
  const name = val.trim();
  if (!name) { renderCriteria(); return; }
  const c = criteria.find(x=>x.id===cid);
  if (!c) return;
  if (criteria.some(x => x.id !== cid && x.name.toLowerCase() === name.toLowerCase())) {
    showToast(`⚠️ "${name}" already exists as a criteria.`);
    renderCriteria(); return;
  }
  c.name = name; save(); populateCriteriaSelect(); renderCriteria(); renderTasks();
}

function editSubName(cid, sid) {
  const span = document.getElementById(`sname-${cid}-${sid}`);
  if (!span || span.querySelector('input')) return;
  const c = criteria.find(x=>x.id===cid);
  const s = c?.subcriteria.find(x=>x.id===sid);
  if (!s) return;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'sub-name-input';
  inp.value = s.name; inp.maxLength = 40;
  inp.onkeydown = e => {
    if (e.key === 'Enter') saveSubName(cid, sid, inp.value);
    if (e.key === 'Escape') renderCriteria();
  };
  inp.onblur = () => saveSubName(cid, sid, inp.value);
  span.replaceWith(inp);
  inp.focus(); inp.select();
}

function saveSubName(cid, sid, val) {
  const name = val.trim();
  if (!name) { renderCriteria(); return; }
  const c = criteria.find(x=>x.id===cid);
  const s = c?.subcriteria.find(x=>x.id===sid);
  if (!s) return;
  if (c.subcriteria.some(x => x.id !== sid && x.name.toLowerCase() === name.toLowerCase())) {
    showToast(`⚠️ "${name}" already exists in ${c.name}.`);
    renderCriteria(); return;
  }
  s.name = name; save(); populateCriteriaSelect(); renderCriteria(); renderTasks();
}

// ═══════════════════════════════════════════════════
// REORDER TASKS
// ═══════════════════════════════════════════════════
function moveSubGroup(cid, sid, dir) {
  const c = criteria.find(x => x.id === cid);
  if (!c) return;
  const idx = c.subcriteria.findIndex(s => s.id === sid);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= c.subcriteria.length) return;
  [c.subcriteria[idx], c.subcriteria[newIdx]] = [c.subcriteria[newIdx], c.subcriteria[idx]];
  save();
  renderTasks();
}

function moveTask(taskId, dir) {
  const t = tasks.find(t => t.id === taskId);
  if (!t) return;
  const group = tasks.filter(x =>
    !x.done &&
    x.criteriaId    === t.criteriaId &&
    x.subcriteriaId === t.subcriteriaId
  );
  const idx = group.indexOf(t);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= group.length) return;
  const ai = tasks.indexOf(group[idx]);
  const bi = tasks.indexOf(group[newIdx]);
  [tasks[ai], tasks[bi]] = [tasks[bi], tasks[ai]];
  save();
  renderTasks();
}
// ═══════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function periodLabel(t) {
  if (t.period === 'na') return 'N/A';
  if (t.period === 'custom') {
    if (t.periodStart && t.periodEnd && t.periodStart !== t.periodEnd)
      return `${t.periodStart} → ${t.periodEnd}`;
    return t.periodStart || 'Custom';
  }
  return t.period.charAt(0).toUpperCase() + t.period.slice(1);
}

// ═══════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════
// ─── Export path memory (IndexedDB stores the file handle across sessions) ───
let savedFileHandle = null;

async function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('WhatTheTask', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => res(e.target.result);
    req.onerror   = rej;
  });
}
async function idbPut(key, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(val, key);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx  = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = () => res(req.result || null);
    req.onerror   = rej;
  });
}

async function initExportHandle() {
  if (!window.showSaveFilePicker) return;
  try {
    const handle = await idbGet('exportHandle');
    if (handle) { savedFileHandle = handle; updateExportBtn(); }
  } catch {}
}

function updateExportBtn() {
  // kept for compatibility — handle is stored silently
}

async function exportData() {
  const data = { exportedAt: new Date().toISOString(), version: 1, tasks, criteria };
  const json = JSON.stringify(data, null, 2);
  const date = new Date().toISOString().slice(0, 10);
  const fileName = `WhatTheTask-backup-${date}.json`;

  if (window.showSaveFilePicker) {
    try {
      const opts = {
        suggestedName: fileName,
        types: [{ description: 'WhatTheTask Backup', accept: { 'application/json': ['.json'] } }]
      };
      // Open dialog at last used folder
      if (savedFileHandle) opts.startIn = savedFileHandle;
      const handle = await window.showSaveFilePicker(opts);
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
      // Remember folder for next time
      savedFileHandle = handle;
      await idbPut('exportHandle', handle);
      updateExportBtn();
      showToast('💾 Saved!');
      return;
    } catch (err) {
      if (err.name === 'AbortError') return;
    }
  }

  // Fallback for Firefox / unsupported browsers
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Exported — check your Downloads folder.');
}

async function importData() {
  let text;

  if (window.showOpenFilePicker) {
    try {
      const opts = {
        types: [{ description: 'WhatTheTask Backup', accept: { 'application/json': ['.json'] } }],
        multiple: false
      };
      // Open dialog at last used folder
      if (savedFileHandle) opts.startIn = savedFileHandle;
      const [handle] = await window.showOpenFilePicker(opts);
      const file = await handle.getFile();
      text = await file.text();
      // Remember folder for next time
      savedFileHandle = handle;
      await idbPut('exportHandle', handle);
      updateExportBtn();
    } catch (err) {
      if (err.name === 'AbortError') return;
      showToast('❌ Could not open file.'); return;
    }
  } else {
    // Fallback: hidden file input
    document.getElementById('importFileFallback').click();
    return;
  }

  applyImport(text);
}

function importDataFallback(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => applyImport(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';
}

function applyImport(text) {
  try {
    const data = JSON.parse(text);
    if (!data.tasks || !data.criteria) {
      showToast('❌ Invalid file — please use a WhatTheTask backup.'); return;
    }
    if (!confirm(`Import ${data.tasks.length} tasks and ${data.criteria.length} criteria?\n\nThis will REPLACE your current data.`)) return;
    tasks    = data.tasks;
    criteria = data.criteria;
    save();
    populateCriteriaSelect();
    renderTasks();
    updateGlobalStats();
    updateDoneBadge();
    showToast(`✅ Imported ${tasks.length} tasks successfully!`);
  } catch {
    showToast('❌ Could not read file — is it a valid JSON backup?');
  }
}

function showToast(msg) {
  const existing = document.querySelector('.import-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'import-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

  document.getElementById('dateDisplay').textContent =

  // Init year input
  const yi = document.getElementById('dashYearInput');

  // Restore remembered export path
  initExportHandle();

  // Keyboard shortcuts
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
  document.getElementById('newCriteriaName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCriteria();
  });
});
